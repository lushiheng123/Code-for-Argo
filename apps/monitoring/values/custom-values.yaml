# 关闭不需要的组件（如果你在 K3s 或非完整集群）
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false

# ⚠️ 注意：alertmanager 只出现一次
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# ✅ 打开 node-exporter（采集节点指标）
prometheus-node-exporter:
  enabled: true

# ✅ 打开 kube-state-metrics（采集集群状态指标）
kube-state-metrics:
  enabled: true

# Prometheus 配置
prometheus:
  prometheusSpec:
    storageSpec: null

# Grafana 配置
grafana:
  enabled: true
  adminPassword: "admin123"
  persistence:
    enabled: true
    storageClassName: standard
    size: 10Gi
  defaultDashboardsEnabled: true
  service:
    type: NodePort
    nodePort: 30300

# 默认规则
defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false
