
# 禁用 dex（测试环境不需要）
dex:
  enabled: false

# 使用 NodePort 访问 UI
server:
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443
  config:
    url: http://localhost:30080
    dex.config: ""
  
  # 额外的命令行参数
  extraArgs:
  - --insecure

# 配置初始密码
configs:
  secret:
    argocdServerAdminPassword: "$2a$10$rRyBsGSHK6g.7T4RcM5.kO1N7Fz5v5y5z5v5y5z5v5y5z5v5y5z5"
  params:
    server.insecure: true

# 资源限制
controller:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
