apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/lushiheng123/Code-for-Argo.git
    targetRevision: argocd_monitor
    path: monitoring
    
    helm:
      valueFiles:
      - values/custom-values.yaml
      # 添加依赖更新
      parameters:
      - name: "global.imageRegistry"
        value: "docker.io"
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2