apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/lushiheng123/Code-for-Argo.git
    targetRevision: argocd_monitor
    path: monitoring
    
    helm:
      valueFiles:
      - values/custom-values.yaml
      # ⚠️ 删除 parameters 部分，不需要这个
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    - ServerSideApply=true  # ✅ 推荐添加，避免 CRD 冲突
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
