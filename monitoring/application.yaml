apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  
  source:
    repoURL: https://github.com/lushiheng123/Code-for-Argo.git
    targetRevision: argocd_prometheus  # 改为 argocd_prometheus 分支
    path: .  # 当前目录就是 argocd_prometheus
    
    helm:
      valueFiles:
      - monitoring/values/custom-values.yaml  # 修正路径
    
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2