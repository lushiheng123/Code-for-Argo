# 关闭不需要的组件（如果你在 K3s 或非完整集群）
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
alertmanager:
  enabled: false
prometheus-node-exporter:
  enabled: false
kube-state-metrics:
  enabled: false
defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeScheduler: false
    kubeProxy: false

# Prometheus 配置
prometheus:
  prometheusSpec:
    storageSpec: null

# AlertManager 配置
alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# Grafana 配置
grafana:
  enabled: true
  adminPassword: "admin123"
  persistence:
    enabled: true
    storageClassName: standard
    size: 10Gi
  # ✅ 添加默认 dashboards
  defaultDashboardsEnabled: true
  # ✅ 允许通过 ingress/service 访问
  service:
    type: NodePort
    nodePort: 30300
